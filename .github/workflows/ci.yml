name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build, Lint, and Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for CodeRabbit and better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matching the @types/node version in package.json
          cache: 'npm'
          cache-dependency-path: './package-lock.json' # Adjust to yarn.lock or pnpm-lock.yaml if needed

      - name: Install Dependencies
        run: npm ci # Use npm ci for clean, reliable installs

      - name: Run Linter
        run: npm run lint

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Build Application
        run: npm run build
